<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão Financeira - J.E Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; background-color: #04101F; color: #f4f4f5; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 50; align-items: center; justify-content: center; padding: 1.5rem; }
        .modal.active { display: flex; }
        .view { display: none; }
        .view.active { display: block; animation: fadeIn 0.3s ease-out; }
        
        .bg-navy-dark { background-color: #04101F; }
        .bg-navy-base { background-color: #0A2239; }
        .bg-navy-highlight { background-color: #0077F5; }
        .gradient-main-card { background: linear-gradient(135deg, #0A2239 0%, #004D99 100%); }
        
        .logo-text {
            font-size: 3rem;
            font-weight: 800;
            color: #FFD700;
            letter-spacing: -0.05em;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-item { animation: fadeIn 0.3s ease-out forwards; }
        
        .suggestion-chip {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 6px 14px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            color: #a1a1aa;
            cursor: pointer;
            transition: all 0.2s;
        }
        .suggestion-chip:active { background: #0077F5; color: white; }
    </style>
</head>
<body class="min-h-screen pb-32">

    <div id="view-home" class="view active max-w-md mx-auto p-6 bg-navy-base rounded-b-[3rem] shadow-xl relative border-b border-white/5">
        <header class="flex flex-col items-center mb-8 pt-4">
            <div class="logo-text animate-item">J.E</div>
            <h1 class="text-xl font-bold uppercase tracking-widest text-white">Gestão Financeira</h1>
            <button onclick="clearData()" class="mt-5 text-[9px] text-rose-500/70 border border-rose-500/20 px-5 py-1.5 rounded-full bg-rose-500/5 font-bold uppercase tracking-widest">Limpar Tudo</button>
        </header>

        <div class="gradient-main-card p-7 rounded-[2.5rem] shadow-2xl mb-8 relative overflow-hidden">
            <p class="text-blue-100 text-xs uppercase font-bold tracking-wider">Saldo em Conta</p>
            <h2 id="total-balance" class="text-4xl font-extrabold mt-2 tracking-tighter text-white">R$ 0,00</h2>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="glass p-4 rounded-2xl border-l-4 border-l-emerald-500">
                <p class="text-zinc-500 text-[10px] font-bold uppercase">Entradas</p>
                <p id="total-income" class="text-emerald-500 font-bold text-lg">R$ 0,00</p>
            </div>
            <div class="glass p-4 rounded-2xl border-l-4 border-l-rose-500">
                <p class="text-zinc-500 text-[10px] font-bold uppercase">Saídas</p>
                <p id="total-expense" class="text-rose-500 font-bold text-lg">R$ 0,00</p>
            </div>
        </div>

        <div class="glass p-6 rounded-[2.5rem] mb-10 flex flex-col items-center border border-white/5">
            <div style="width: 160px; height: 160px;"><canvas id="financeChart"></canvas></div>
        </div>

        <div id="transaction-list" class="space-y-4 mb-10"></div>
    </div>

    <div id="view-settings" class="view max-w-md mx-auto p-6 bg-navy-base rounded-b-[3rem]">
        <header class="mb-8 pt-2"><h1 class="text-2xl font-bold">Configurações</h1></header>
        
        <div id="profile-card" class="glass p-6 rounded-3xl flex items-center mb-8">
            <div id="user-avatar" class="w-14 h-14 bg-navy-highlight rounded-full flex items-center justify-center text-xl mr-4 font-bold shadow-lg">?</div>
            <div>
                <h2 id="user-name-display" class="font-bold text-white">Modo Visitante</h2>
                <p id="user-email-display" class="text-zinc-500 text-xs">Dados locais ativos</p>
            </div>
        </div>

        <div id="auth-actions">
            <button id="btn-login-trigger" onclick="openModal('auth-modal')" class="w-full bg-navy-highlight py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-transform">Vincular E-mail</button>
            <button id="btn-logout" onclick="logout()" class="hidden w-full border border-rose-500/30 text-rose-500 py-4 rounded-2xl font-bold">Desconectar</button>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 glass p-3 flex justify-around items-end rounded-t-[2.5rem] z-40 h-24 shadow-2xl">
        <button onclick="changeView('home')" class="flex flex-col items-center w-20 pb-2">🏠<span class="text-[10px] uppercase font-bold mt-1">Painel</span></button>
        <button onclick="openModal('trans-modal')" class="bg-navy-highlight w-14 h-14 rounded-full flex items-center justify-center text-white text-4xl shadow-xl mb-4 active:scale-90 transition-transform">+</button>
        <button onclick="changeView('settings')" class="flex flex-col items-center w-20 pb-2 text-zinc-500">⚙️<span class="text-[10px] uppercase font-bold mt-1">Conta</span></button>
    </nav>

    <div id="auth-modal" class="modal">
        <div class="bg-navy-dark w-full max-w-xs rounded-[2.5rem] p-8 border border-zinc-800">
            <h2 class="text-xl font-bold mb-2 text-center">Salvar na Nuvem</h2>
            <p class="text-zinc-500 text-[10px] text-center mb-6 px-2">Insira seu e-mail para carregar ou salvar seus dados em qualquer lugar.</p>
            <input type="text" id="login-name" placeholder="Seu Nome" class="w-full bg-navy-base border border-zinc-800 rounded-2xl p-4 mb-4 outline-none">
            <input type="email" id="login-email" placeholder="seu@email.com" class="w-full bg-navy-base border border-zinc-800 rounded-2xl p-4 mb-6 outline-none">
            <button onclick="startAuthFlow()" class="w-full bg-navy-highlight py-4 rounded-2xl font-bold">Confirmar</button>
            <button onclick="closeModals()" class="w-full mt-4 text-zinc-500 text-xs">Cancelar</button>
        </div>
    </div>

    <div id="trans-modal" class="modal">
        <div class="bg-navy-dark w-full max-w-xs rounded-[2.5rem] p-8 border border-zinc-800">
            <h2 class="text-xl font-bold mb-6 text-center">Nova Movimentação</h2>
            <div class="grid grid-cols-2 gap-3 mb-6">
                <button onclick="setType('income')" id="btn-inc" class="py-3 rounded-2xl border-2 border-emerald-500/50 bg-emerald-500/10 text-emerald-500 font-bold">Ganho</button>
                <button onclick="setType('expense')" id="btn-exp" class="py-3 rounded-2xl border border-zinc-700 text-zinc-400">Gasto</button>
            </div>
            <input type="text" id="desc" placeholder="O que foi?" class="w-full bg-navy-base border border-zinc-800 rounded-2xl p-4 mb-4 outline-none">
            <div id="suggestion-container" class="flex flex-wrap gap-2 mb-6"></div>
            <input type="number" id="amount" placeholder="Valor R$" class="w-full bg-navy-base border border-zinc-800 rounded-2xl p-4 mb-8 outline-none">
            <div class="flex gap-2">
                <button onclick="closeModals()" class="flex-1 py-4 text-zinc-500 text-sm">Voltar</button>
                <button onclick="addTransaction()" class="flex-1 bg-navy-highlight py-4 rounded-2xl font-bold">Salvar</button>
            </div>
        </div>
    </div>

    <script>
        let transactions = [];
        let currentUser = JSON.parse(localStorage.getItem('user_pro_je')) || null;
        let selectedType = 'income';
        let myChart = null;

        const suggestions = {
            income: ['Salário', 'Pix Recebido', 'Venda', 'Bônus'],
            expense: ['Aluguel', 'Mercado', 'Combustível', 'Lanche', 'Internet']
        };

        // --- INICIALIZAÇÃO ---
        window.onload = () => {
            initChart();
            loadAppData();
            updateAuthUI();
        };

        function initChart() {
            const ctx = document.getElementById('financeChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: { datasets: [{ data: [0, 0], backgroundColor: ['#10b981', '#f43f5e'], borderWidth: 0, cutout: '80%' }] },
                options: { responsive: true, plugins: { legend: { display: false } } }
            });
        }

        // --- LÓGICA DE DADOS ---
        function loadAppData() {
            const storageKey = currentUser ? `fin_data_${currentUser.email}` : 'fin_data_local';
            transactions = JSON.parse(localStorage.getItem(storageKey)) || [];
            render();
        }

        function saveData() {
            const storageKey = currentUser ? `fin_data_${currentUser.email}` : 'fin_data_local';
            localStorage.setItem(storageKey, JSON.stringify(transactions));
            render();
        }

        function addTransaction() {
            const desc = document.getElementById('desc').value;
            const amount = parseFloat(document.getElementById('amount').value);
            
            if(!desc || !amount) return alert('Preencha os campos!');

            transactions.unshift({
                id: Date.now(),
                desc,
                amount: selectedType === 'expense' ? -Math.abs(amount) : Math.abs(amount),
                date: new Date().toLocaleDateString('pt-BR')
            });

            saveData();
            closeModals();
            document.getElementById('desc').value = '';
            document.getElementById('amount').value = '';
        }

        function render() {
            const list = document.getElementById('transaction-list');
            list.innerHTML = '';
            let inc = 0, exp = 0;

            transactions.forEach(t => {
                const isExp = t.amount < 0;
                if(isExp) exp += Math.abs(t.amount); else inc += t.amount;

                const item = document.createElement('div');
                item.className = 'flex justify-between items-center p-4 glass rounded-2xl border border-white/5 animate-item';
                item.innerHTML = `
                    <div class="flex items-center">
                        <div class="w-10 h-10 ${isExp ? 'bg-rose-500/10 text-rose-500' : 'bg-emerald-500/10 text-emerald-500'} rounded-xl flex items-center justify-center mr-3 font-bold">${isExp ? '↓' : '↑'}</div>
                        <div><p class="font-medium text-sm text-white">${t.desc}</p><p class="text-zinc-600 text-[10px] uppercase font-bold">${t.date}</p></div>
                    </div>
                    <div class="text-right">
                        <p class="${isExp ? 'text-rose-500' : 'text-emerald-500'} font-bold">R$ ${Math.abs(t.amount).toLocaleString('pt-BR', {minimumFractionDigits: 2})}</p>
                        <button onclick="deleteItem(${t.id})" class="text-[9px] text-zinc-600 hover:text-rose-400 font-bold uppercase tracking-tighter">Excluir</button>
                    </div>
                `;
                list.appendChild(item);
            });

            document.getElementById('total-balance').innerText = `R$ ${(inc - exp).toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            document.getElementById('total-income').innerText = `R$ ${inc.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            document.getElementById('total-expense').innerText = `R$ ${exp.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            
            if(myChart) {
                myChart.data.datasets[0].data = [inc || 1, exp || (inc ? 0 : 1)];
                myChart.update();
            }
        }

        // --- LÓGICA DE LOGIN (VINCULAÇÃO) ---
        function startAuthFlow() {
            const name = document.getElementById('login-name').value;
            const email = document.getElementById('login-email').value;

            if(!name || !email.includes('@')) return alert('Insira um e-mail válido!');

            // Simulação de segurança: O sistema aceita o e-mail e muda o banco de dados
            currentUser = { name, email };
            localStorage.setItem('user_pro_je', JSON.stringify(currentUser));
            
            alert(`Conta vinculada com sucesso!\nSeu histórico agora será salvo sob o e-mail: ${email}`);
            
            closeModals();
            updateAuthUI();
            loadAppData();
        }

        function logout() {
            if(confirm("Deseja desconectar? Seus dados permanecem salvos na nuvem desta conta.")) {
                localStorage.removeItem('user_pro_je');
                currentUser = null;
                updateAuthUI();
                loadAppData();
            }
        }

        function updateAuthUI() {
            const isLogged = !!currentUser;
            document.getElementById('btn-login-trigger').classList.toggle('hidden', isLogged);
            document.getElementById('btn-logout').classList.toggle('hidden', !isLogged);
            document.getElementById('user-name-display').innerText = isLogged ? currentUser.name : "Modo Visitante";
            document.getElementById('user-email-display').innerText = isLogged ? currentUser.email : "Dados locais ativos";
            document.getElementById('user-avatar').innerText = isLogged ? currentUser.name.charAt(0).toUpperCase() : "?";
        }

        // --- UTILITÁRIOS ---
        function changeView(v) {
            document.querySelectorAll('.view').forEach(view => view.classList.remove('active'));
            document.getElementById(`view-${v}`).classList.add('active');
        }

        function openModal(id) {
            document.getElementById(id).classList.add('active');
            if(id === 'trans-modal') renderSuggestions();
        }

        function closeModals() {
            document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
        }

        function setType(type) {
            selectedType = type;
            document.getElementById('btn-inc').className = type === 'income' ? 'py-3 rounded-2xl border-2 border-emerald-500/50 bg-emerald-500/10 text-emerald-500 font-bold' : 'py-3 rounded-2xl border border-zinc-700 text-zinc-400';
            document.getElementById('btn-exp').className = type === 'expense' ? 'py-3 rounded-2xl border-2 border-rose-500/50 bg-rose-500/10 text-rose-500 font-bold' : 'py-3 rounded-2xl border border-zinc-700 text-zinc-400';
            renderSuggestions();
        }

        function renderSuggestions() {
            const cont = document.getElementById('suggestion-container');
            cont.innerHTML = '';
            suggestions[selectedType].forEach(s => {
                const chip = document.createElement('div');
                chip.className = 'suggestion-chip';
                chip.innerText = s;
                chip.onclick = () => document.getElementById('desc').value = s;
                cont.appendChild(chip);
            });
        }

        function deleteItem(id) {
            if(confirm("Excluir este item?")) {
                transactions = transactions.filter(t => t.id !== id);
                saveData();
            }
        }

        function clearData() {
            if(confirm("Isso apagará o histórico atual. Continuar?")) {
                transactions = [];
                saveData();
            }
        }
    </script>
</body>
</html>
